<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ontario K vs Spooner NHL Picks Updated Report</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://unpkg.com/papaparse@latest/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chrono-node/1.3.11/chrono.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.15.0/Recharts.min.js"></script>
</head>
<body class="bg-gray-100 font-sans">
  <!-- Rendering main app container -->
  <div id="root" class="container mx-auto px-4 py-8"></div>

  <script type="text/babel">
    // Initializing React root
    const { createRoot } = ReactDOM;
    const root = createRoot(document.getElementById('root'));

    // Defining main App component
    function App() {
      const [data, setData] = React.useState(null);
      const [loading, setLoading] = React.useState(true);

      // Loading and parsing CSV data
      React.useEffect(() => {
        const csv = loadFileData('0420.csv');
        Papa.parse(csv, {
          header: true,
          skipEmptyLines: true,
          transformHeader: (header) => header.trim().replace(/^"|"$/g, ''),
          transform: (value, header) => {
            let cleaned = value.trim().replace(/^"|"$/g, '');
            return cleaned;
          },
          complete: (results) => {
            const cleanedData = results.data.map(row => ({
              Timestamp: chrono.parseDate(row['Timestamp']),
              Nickname: row['Your Nickname'],
              JetsVsBlues: row['Who will win between Winnipeg Jets vs St Louis Blues'],
              StarsVsAvalanche: row['Who will win between Dallas Stars vs Colorado Avalanche'],
              KnightsVsWild: row['Who will win between Las Vegas Golden Knights vs Minnesota Wild'],
              KingsVsOilers: row['Who will win between LA Kings vs Edmonton Oilers'],
              LeafsVsSenators: row['Who will win between Toronto Maple Leaf\'s vs Ottawa Senators'],
              LightningVsPanthers: row['Who will win between Tampa Bay Lightening  vs Florida Panthers'],
              CapitalsVsCanadians: row['Who will win between Washington Capitals vs Montreal Canadians'],
              HurricanesVsDevils: row['Who will win between  Carolina Panthers   vs New Jersey Devils']
            }));
            setData(cleanedData);
            setLoading(false);
          },
          error: (err) => {
            console.error(err);
            setLoading(false);
          }
        });
      }, []);

      // Rendering loading state
      if (loading) {
        return (
          <div className="text-center py-16">
            <h2 className="text-2xl font-bold text-blue-900">Loading Picks...</h2>
          </div>
        );
      }

      // Defining Game 1 results
      const gameResults = {
        JetsVsBlues: { winner: 'Winnipeg Jets', score: '5-3' },
        StarsVsAvalanche: { winner: 'Colorado Avalanche', score: '5-1' }
      };

      // Calculating correct picks
      const correctPicks = data.map(row => {
        let correctCount = 0;
        if (row.JetsVsBlues === gameResults.JetsVsBlues.winner) correctCount++;
        if (row.StarsVsAvalanche === gameResults.StarsVsAvalanche.winner) correctCount++;
        return { ...row, correctCount };
      });

      // Preparing data for visualizations
      const matchups = [
        { key: 'JetsVsBlues', teams: ['Winnipeg Jets', 'St Louis Blues'], result: gameResults.JetsVsBlues },
        { key: 'StarsVsAvalanche', teams: ['Dallas Stars', 'Colorado Avalanche'], result: gameResults.StarsVsAvalanche },
        { key: 'KnightsVsWild', teams: ['Las Vegas Golden Knights', 'Minnesota Wild'], result: null },
        { key: 'KingsVsOilers', teams: ['LA Kings', 'Edmonton Oilers'], result: null },
        { key: 'LeafsVsSenators', teams: ['Toronto Maple Leaf\'s', 'Ottawa Senators'], result: null },
        { key: 'LightningVsPanthers', teams: ['Tampa Bay Lightening', 'Florida Panthers'], result: null },
        { key: 'CapitalsVsCanadians', teams: ['Washington Capitals', 'Montreal Canadians'], result: null },
        { key: 'HurricanesVsDevils', teams: ['Carolina Panthers', 'New Jersey Devils'], result: null }
      ];

      const pickCounts = matchups.map(matchup => {
        const counts = {};
        matchup.teams.forEach(team => {
          counts[team] = data.filter(row => row[matchup.key] === team).length;
        });
        return { matchup: matchup.key, ...counts };
      });

      const correctPickData = [
        { name: 'Both Correct', value: correctPicks.filter(row => row.correctCount === 2).length },
        { name: 'One Correct', value: correctPicks.filter(row => row.correctCount === 1).length },
        { name: 'None Correct', value: correctPicks.filter(row => row.correctCount === 0).length }
      ];

      // Rendering main report
      return (
        <div className="space-y-12">
          {/* Displaying header */}
          <header className="bg-blue-900 text-white py-6 rounded-lg text-center">
            <h1 className="text-3xl md:text-4xl font-bold">Ontario K vs Spooner NHL Picks Update</h1>
            <p className="text-lg mt-2">2025 Stanley Cup Playoffs - Game 1 Results & Trends</p>
          </header>

          {/* Summarizing picks and results */}
          <section className="bg-white p-6 rounded-lg shadow-md">
            <h2 className="text-2xl font-bold text-blue-900 mb-4">Summary</h2>
            <p className="text-gray-700">
              The 2025 Stanley Cup Playoffs are underway, and the Ontario K vs. Spooner NHL Bracket Tracker has 11 submissions from 10 participants. Game 1 results are in: the Winnipeg Jets defeated the St. Louis Blues 5-3, and the Colorado Avalanche crushed the Dallas Stars 5-1. Four participants nailed both picks, while the Toronto Maple Leafs remain a near-unanimous favorite against the Ottawa Senators. Check out the updated picks, results, trends, and fun facts below![](https://www.nhl.com/news/2025-stanley-cup-playoffs-first-round-schedule-television-results)
            </p>
          </section>

          {/* Displaying picks table */}
          <section className="bg-white p-6 rounded-lg shadow-md overflow-x-auto">
            <h2 className="text-2xl font-bold text-blue-900 mb-4">Picks Table</h2>
            <table className="w-full text-left text-sm">
              <thead className="bg-blue-100">
                <tr>
                  <th className="p-3">Nickname</th>
                  <th className="p-3">Jets vs Blues</th>
                  <th className="p-3">Stars vs Avalanche</th>
                  <th className="p-3">Knights vs Wild</th>
                  <th className="p-3">Kings vs Oilers</th>
                  <th className="p-3">Leafs vs Senators</th>
                  <th className="p-3">Lightning vs Panthers</th>
                  <th className="p-3">Capitals vs Canadians</th>
                  <th className="p-3">Hurricanes vs Devils</th>
                </tr>
              </thead>
              <tbody>
                {correctPicks.map((row, index) => (
                  <tr key={index} className="border-b">
                    <td className="p-3">{row.Nickname}</td>
                    <td className={`p-3 ${row.JetsVsBlues === gameResults.JetsVsBlues.winner ? 'bg-green-100' : 'bg-red-100'}`}>
                      {row.JetsVsBlues}
                    </td>
                    <td className={`p-3 ${row.StarsVsAvalanche === gameResults.StarsVsAvalanche.winner ? 'bg-green-100' : 'bg-red-100'}`}>
                      {row.StarsVsAvalanche}
                    </td>
                    <td className="p-3">{row.KnightsVsWild}</td>
                    <td className="p-3">{row.KingsVsOilers}</td>
                    <td className="p-3">{row.LeafsVsSenators}</td>
                    <td className="p-3">{row.LightningVsPanthers}</td>
                    <td className="p-3">{row.CapitalsVsCanadians}</td>
                    <td className="p-3">{row.HurricanesVsDevils}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            <p className="text-gray-600 text-sm mt-2">Green: Correct pick | Red: Incorrect pick (based on Game 1 results)</p>
          </section>

          {/* Visualizing pick trends */}
          <section className="bg-white p-6 rounded-lg shadow-md">
            <h2 className="text-2xl font-bold text-blue-900 mb-4">Trends & Visualizations</h2>
            <div className="space-y-8">
              {/* Rendering bar chart for picks per matchup */}
              {pickCounts.map((counts, index) => (
                <div key={index}>
                  <h3 className="text-lg font-semibold text-gray-800 mb-2">
                    {matchups[index].teams.join(' vs ')}
                    {matchups[index].result ? ` (Game 1: ${matchups[index].result.winner} won ${matchups[index].result.score})` : ''}
                  </h3>
                  <Recharts.ResponsiveContainer width="100%" height={300}>
                    <Recharts.BarChart data={[counts]} margin={{ top: 20, right: 20, bottom: 20, left: 20 }}>
                      <Recharts.CartesianGrid strokeDasharray="3 3" />
                      <Recharts.XAxis dataKey="matchup" hide />
                      <Recharts.YAxis label={{ value: 'Number of Picks', angle: -90, position: 'insideLeft', style: { fontSize: 12 } }} style={{ fontSize: 12 }} />
                      <Recharts.Tooltip contentStyle={{ fontSize: 12 }} />
                      <Recharts.Legend wrapperStyle={{ fontSize: 12 }} />
                      {matchups[index].teams.map(team => (
                        <Recharts.Bar
                          key={team}
                          dataKey={team}
                          fill={matchups[index].result && team === matchups[index].result.winner ? '#10B981' : team === matchups[index].teams[0] ? '#1D4ED8' : '#EF4444'}
                        />
                      ))}
                    </Recharts.BarChart>
                  </Recharts.ResponsiveContainer>
                </div>
              ))}

              {/* Rendering pie chart for correct picks */}
              <div>
                <h3 className="text-lg font-semibold text-gray-800 mb-2">Correct Picks After Game 1</h3>
                <Recharts.ResponsiveContainer width="100%" height={300}>
                  <Recharts.PieChart>
                    <Recharts.Pie
                      data={correctPickData}
                      dataKey="value"
                      nameKey="name"
                      cx="50%"
                      cy="50%"
                      outerRadius={100}
                      fill="#1D4ED8"
                      label={{ style: { fontSize: 12 } }}
                    >
                      {correctPickData.map((entry, index) => (
                        <Recharts.Cell key={`cell-${index}`} fill={['#10B981', '#F59E0B', '#EF4444'][index]} />
                      ))}
                    </Recharts.Pie>
                    <Recharts.Tooltip contentStyle={{ fontSize: 12 }} />
                    <Recharts.Legend wrapperStyle={{ fontSize: 12 }} />
                  </Recharts.PieChart>
                </Recharts.ResponsiveContainer>
              </div>
            </div>
          </section>

          {/* Highlighting fun facts */}
          <section className="bg-white p-6 rounded-lg shadow-md">
            <h2 className="text-2xl font-bold text-blue-900 mb-4">Fun Facts</h2>
            <ul className="list-disc pl-6 text-gray-700 space-y-2">
              <li><strong>Early Leaders:</strong> Elgourdo, J, Spooner - My Picks, and Blanket are perfect so far, correctly picking both the Jets and Avalanche in Game 1!</li>
              <li><strong>Biggest Upset:</strong> The Avalanche’s 5-1 rout of the Stars surprised half the participants, with 5 incorrectly picking Dallas.</li>
              <li><strong>Bold Move:</strong> Spooner Vs Ontario K Picks is the only one backing the Ottawa Senators against the heavily favored Toronto Maple Leafs (10/11 picks).</li>
              <li><strong>Hot Streak Potential:</strong> The Jets’ Game 1 win aligns with their Presidents’ Trophy status, backed by 7 participants. Can they keep it up?</li>[](https://www.nhl.com/news/2025-stanley-cup-playoffs-first-round-schedule-television-results)
            </ul>
          </section>

          {/* Highlighting trends */}
          <section className="bg-white p-6 rounded-lg shadow-md">
            <h2 className="text-2xl font-bold text-blue-900 mb-4">Trends</h2>
            <ul className="list-disc pl-6 text-gray-700 space-y-2">
              <li><strong>Fan Favorites:</strong> Toronto Maple Leafs (10/11) and Vegas Golden Knights (7/11) are the most popular picks, reflecting confidence in their playoff prowess.</li>
              <li><strong>Even Splits:</strong> The Stars vs. Avalanche matchup was perfectly split (5-5), but the Avalanche’s Game 1 win gives their backers an edge.</li>
              <li><strong>Spooner’s Strategy:</strong> Spooner’s two brackets show a shift, picking Ottawa in one but Toronto in the other, hedging on the Battle of Ontario.</li>
              <li><strong>Underdog Watch:</strong> Montreal Canadians (3/11) and Ottawa Senators (1/11) are the least picked, but could surprise as underdogs.</li>
            </ul>
          </section>

          {/* Concluding the report */}
          <section className="bg-white p-6 rounded-lg shadow-md">
            <h2 className="text-2xl font-bold text-blue-900 mb-4">Conclusion</h2>
            <p className="text-gray-700">
              The Ontario K vs. Spooner NHL Bracket Tracker is off to an exciting start with Game 1 results shaking up the leaderboard. With perfect picks from four participants and bold underdog choices like Ottawa, the 2025 Stanley Cup Playoffs are full of surprises. Stay tuned for more results and keep competing to see who can outpredict Ontario K and Spooner!
            </p>
            <a
              href="https://forms.gle/k5rn5aTJnWEYAYjn7"
              className="mt-4 inline-block bg-yellow-500 text-blue-900 px-6 py-3 rounded-full font-semibold hover:bg-yellow-400"
            >
              Submit or Update Your Bracket
            </a>
          </section>
        </div>
      );
    }

    // Rendering the app
    root.render(<App />);
  </script>
</body>
</html>
